name: MLOps Pipeline

on:
  push:
    branches: [master, main]
    paths:
      - '.github/workflows/**'
      - 'data/**.dvc'
      - 'src/**.py'
      - 'params.yaml'
  workflow_dispatch:

jobs:

  # ---------------------------------------------------------------------------
  # JOB 1 - UNIT TEST
  # Chay unit tests tren du lieu ao (khong can ket noi cloud storage).
  # Neu co bat ky test nao that bai, pipeline dung lai o day va khong tien hanh
  # huan luyen hay trien khai.
  # ---------------------------------------------------------------------------
  test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v


  # ---------------------------------------------------------------------------
  # JOB 2 - TRAIN
  # Xac thuc cloud storage, pull du lieu bang DVC, huan luyen mo hinh, upload artifact.
  # Chi chay khi Job 1 (Unit Test) hoan thanh thanh cong.
  # ---------------------------------------------------------------------------
  train:
    name: Train
    needs: test
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to AWS S3
        env:
          CLOUD_CREDENTIALS: ${{ secrets.CLOUD_CREDENTIALS }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID_SECRET: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY_SECRET: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          python - <<'EOF'
          import json
          import os
          import sys

          creds = os.environ.get('CLOUD_CREDENTIALS', '').strip()
          access_key = os.environ.get('AWS_ACCESS_KEY_ID_SECRET', '').strip()
          secret_key = os.environ.get('AWS_SECRET_ACCESS_KEY_SECRET', '').strip()
          region = os.environ.get('AWS_REGION', '').strip() or 'us-east-1'

          if creds:
              try:
                  data = json.loads(creds)
              except json.JSONDecodeError as exc:
                  raise SystemExit(f"Invalid CLOUD_CREDENTIALS format: expected a JSON object. Error: {exc}") from exc
              if 'aws_access_key_id' not in data or 'aws_secret_access_key' not in data:
                  raise SystemExit("CLOUD_CREDENTIALS must contain aws_access_key_id and aws_secret_access_key")
              access_key = data['aws_access_key_id']
              secret_key = data['aws_secret_access_key']
          elif access_key and secret_key:
              pass
          else:
              raise SystemExit("Missing AWS credentials. Set either CLOUD_CREDENTIALS (JSON) or AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY secrets.")

          with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as fh:
              fh.write(f"AWS_ACCESS_KEY_ID={access_key}\n")
              fh.write(f"AWS_SECRET_ACCESS_KEY={secret_key}\n")
              fh.write(f"AWS_DEFAULT_REGION={region}\n")
          EOF

      - name: Pull data with DVC
        run: dvc pull data/train_phase1.csv data/eval.csv

      - name: Train model
        run: python src/train.py

      - name: Read metrics
        id: read_metrics
        run: |
          ACC=$(python -c "import json; d=json.load(open('outputs/metrics.json')); print(d['accuracy'])")
          echo "accuracy=$ACC" >> $GITHUB_OUTPUT

      - name: Upload model to S3
        env:
          CLOUD_BUCKET: ${{ secrets.CLOUD_BUCKET }}
        run: |
          python - <<'EOF'
          import os
          import boto3
          bucket_name = os.environ['CLOUD_BUCKET']
          s3 = boto3.client('s3')
          s3.upload_file('models/model.pkl', bucket_name, 'models/latest/model.pkl')
          print(f'Uploaded model to s3://{bucket_name}/models/latest/model.pkl')
          EOF

      - name: Save metrics as artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: outputs/metrics.json


  # ---------------------------------------------------------------------------
  # JOB 3 - EVAL
  # Kiem tra nguong chat luong (accuracy >= 0.70).
  # Pipeline dung lai o day neu mo hinh chua dat yeu cau.
  # Chi chay khi Job 2 (Train) hoan thanh thanh cong.
  # ---------------------------------------------------------------------------
  eval:
    name: Eval
    needs: train
    runs-on: ubuntu-latest
    steps:

      - name: Check eval gate
        run: |
          python - <<'EOF'
          import os
          acc = float(os.environ['ACC'])
          threshold = 0.64
          if acc < threshold:
              raise SystemExit(f"FAILED: accuracy {acc:.4f} < {threshold:.2f}. Huy deploy.")
          print(f"PASSED: accuracy {acc:.4f} meets threshold {threshold:.2f}, proceeding to deploy.")
          EOF
        env:
          ACC: ${{ needs.train.outputs.accuracy }}


  # ---------------------------------------------------------------------------
  # JOB 4 - DEPLOY
  # Trien khai len VM qua SSH.
  # Chi chay khi Job 3 (Eval) hoan thanh thanh cong.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy
    needs: eval
    runs-on: ubuntu-latest
    steps:

      - name: SSH deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            sudo systemctl restart mlops-serve || true
            sleep 5
            curl -sf http://localhost:8000/health && echo "Health check passed." || exit 1
